<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#ff6a00" />
<title>Console Financeiro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#ff6a00;
  --border:#e5e7eb;
  --bg:#f4f6fb;
  --card:#fff;
  --muted:#6b7280;
  --danger:#dc2626;
  --success:#16a34a;
  --radius:22px;
  --shadow:0 18px 50px rgba(0,0,0,.12);
}
*{box-sizing:border-box;font-family:Inter;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);overflow:hidden}

.header{
  position:sticky;top:0;z-index:10;
  background:#fff;border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
.header h1{margin:0;font-size:18px;font-weight:900}

.resumo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:12px;
}
.box{
  background:#fff;border-radius:20px;padding:14px;
  box-shadow:var(--shadow)
}
.box h4{margin:0 0 6px;font-size:12px;color:var(--muted)}
.box strong{font-size:20px}
.box.pagar strong{color:var(--danger)}
.box.receber strong{color:var(--success)}

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:0 12px 10px;
}
.tab{
  background:#fff;border:1px solid var(--border);
  padding:12px;border-radius:999px;font-weight:800
}
.tab.active{background:var(--primary);color:#fff;border:none}

.section{
  padding:0 12px 120px;
}
.section h3{
  margin:12px 0 6px;font-size:14px
}

.list{
  display:flex;
  flex-direction:column;
  gap:10px
}

.card{
  background:#fff;border-radius:18px;padding:12px;
  box-shadow:var(--shadow)
}
.top{display:flex;justify-content:space-between;align-items:center}
.badge{font-size:11px;font-weight:900;padding:4px 10px;border-radius:999px}
.badge.pendente{background:#fff7ed;color:#c2410c}
.badge.pago{background:#ecfdf5;color:#16a34a}
.valor{font-size:16px;font-weight:900;margin-top:4px}
.meta{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<div class="header">
  <h1>Console Financeiro</h1>
</div>

<div class="resumo">
  <div class="box pagar">
    <h4>Total a pagar (mês atual)</h4>
    <strong id="totalPagar">R$ 0,00</strong>
  </div>
  <div class="box receber">
    <h4>Total a receber (mês atual)</h4>
    <strong id="totalReceber">R$ 0,00</strong>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="mostrar('pagar', this)">A Pagar</button>
  <button class="tab" onclick="mostrar('receber', this)">A Receber</button>
</div>

<div class="section">
  <div id="listaPagar" class="list"></div>
  <div id="listaReceber" class="list" style="display:none"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

const lojaId = window.parent?.APP_CONTEXT?.userId || null;

function mostrar(tipo, btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");

  listaPagar.style.display = tipo === "pagar" ? "flex" : "none";
  listaReceber.style.display = tipo === "receber" ? "flex" : "none";
}

async function carregar(){
  if(!lojaId) return;

  const hoje = new Date();
  const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split("T")[0];
  const fimMes = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0).toISOString().split("T")[0];

  const { data: pagar, error: e1 } = await sb
    .from("contas_pagar")
    .select("*, fornecedores(nome), planos_contas(nome)")
    .eq("loja_id", lojaId)
    .gte("vencimento", inicioMes)
    .lte("vencimento", fimMes);

  const { data: receber, error: e2 } = await sb
    .from("agendamentos")
    .select("cliente_nome, valor_total, status, data")
    .eq("loja_id", lojaId)
    .gte("data", inicioMes)
    .lte("data", fimMes)
    .in("status", ["CONFIRMADO","CONCLUIDO"]);

  if(e1) console.error(e1);
  if(e2) console.error(e2);

  renderPagar(pagar || []);
  renderReceber(receber || []);
}

function renderPagar(lista){
  let total = 0;
  listaPagar.innerHTML = "";

  lista.forEach(c=>{
    if(c.status === "PENDENTE") total += Number(c.valor || 0);

    listaPagar.innerHTML += `
      <div class="card">
        <div class="top">
          <strong>${c.fornecedores?.nome || c.fornecedor_nome || "Fornecedor"}</strong>
          <span class="badge ${c.status === "PAGO" ? "pago" : "pendente"}">${c.status}</span>
        </div>
        <div class="valor">R$ ${Number(c.valor).toFixed(2).replace(".",",")}</div>
        <div class="meta">
          Vencimento: ${c.vencimento || "-"}<br>
          Plano: ${c.planos_contas?.nome || c.plano_nome || "-"}<br>
          Meio: ${c.meio_pagamento || "-"}
        </div>
      </div>
    `;
  });

  totalPagar.innerText = "R$ " + total.toFixed(2).replace(".",",");
}

function renderReceber(lista){
  let total = 0;
  listaReceber.innerHTML = "";

  lista.forEach(r=>{
    if(r.status === "CONFIRMADO") total += Number(r.valor_total || 0);

    listaReceber.innerHTML += `
      <div class="card">
        <div class="top">
          <strong>${r.cliente_nome || "Cliente"}</strong>
          <span class="badge ${r.status === "CONCLUIDO" ? "pago" : "pendente"}">${r.status}</span>
        </div>
        <div class="valor">R$ ${Number(r.valor_total).toFixed(2).replace(".",",")}</div>
        <div class="meta">
          Data: ${r.data}<br>
          Status: ${r.status === "CONCLUIDO" ? "Recebido" : "A receber"}
        </div>
      </div>
    `;
  });

  totalReceber.innerText = "R$ " + total.toFixed(2).replace(".",",");
}

document.addEventListener("DOMContentLoaded", carregar);
</script>

</body>
</html>
