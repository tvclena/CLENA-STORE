<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WhatsApp • Conectar</title>

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  width:360px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

.qr{
  margin-top:20px;
}

.qr img{
  width:240px;
  border-radius:12px;
}

.status{
  margin-top:15px;
  font-weight:700;
}

.ok{ color:#22c55e }
.off{ color:#ef4444 }
</style>

</head>

<body>

<div class="card">

<h2>📲 Conectar WhatsApp</h2>

<input id="loja" placeholder="ID da loja">

<button onclick="start()">Gerar QR</button>

<div class="qr">
  <img id="qr" style="display:none">
</div>

<div id="status" class="status off">
🔴 Desconectado
</div>

</div>

<script>

let loja_id = null

async function start(){

  loja_id = document.getElementById("loja").value

  if(!loja_id){
    alert("Digite o ID da loja")
    return
  }

  await fetch("/criar-sessao",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ loja_id })
  })

  monitorar()
}

/* ================= LOOP ================= */

function monitorar(){

  setInterval(async ()=>{

    if(!loja_id) return

    // QR
    const qrRes = await fetch(`/qr/${loja_id}`)
    const qrData = await qrRes.json()

    const img = document.getElementById("qr")

    if(qrData.qr){
      img.src = qrData.qr
      img.style.display = "block"
    }

    // STATUS
    const stRes = await fetch(`/status/${loja_id}`)
    const st = await stRes.json()

    const el = document.getElementById("status")

    if(st.conectado){
      el.innerText = "🟢 Conectado"
      el.className = "status ok"
      img.style.display = "none"
    }else{
      el.innerText = "🔴 Aguardando conexão"
      el.className = "status off"
    }

  },2000)
}

</script>

</body>
</html>
