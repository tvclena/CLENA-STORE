<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conectar WhatsApp</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  text-align:center;
  padding:40px;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
}

img{
  width:250px;
  margin-top:20px;
  border-radius:10px;
}

.status{
  margin-top:20px;
  font-weight:bold;
}

.conectado{
  color:#22c55e;
}

.desconectado{
  color:#ef4444;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:100%;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>📲 Conectar WhatsApp</h2>

<input id="loja_id" placeholder="Digite o ID da loja">

<button onclick="iniciar()">Gerar QR</button>

<img id="qr" style="display:none">

<div id="status" class="status desconectado">
Desconectado
</div>

</div>

<script>

let loja_id = null

async function iniciar(){

  loja_id = document.getElementById("loja_id").value

  if(!loja_id){
    alert("Informe o ID da loja")
    return
  }

  await fetch("http://localhost:3000/criar-sessao",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ loja_id })
  })

  monitorar()
}

/* ================= QR ================= */

async function atualizarQR(){

  const res = await fetch(`http://localhost:3000/qr/${loja_id}`)
  const data = await res.json()

  const img = document.getElementById("qr")

  if(data.qr){
    img.src = data.qr
    img.style.display = "block"
  }
}

/* ================= STATUS ================= */

async function atualizarStatus(){

  const res = await fetch(`http://localhost:3000/status/${loja_id}`)
  const data = await res.json()

  const el = document.getElementById("status")

  if(data.conectado){
    el.innerText = "🟢 Conectado"
    el.className = "status conectado"
    document.getElementById("qr").style.display = "none"
  }else{
    el.innerText = "🔴 Desconectado"
    el.className = "status desconectado"
  }
}

/* ================= LOOP ================= */

function monitorar(){

  setInterval(()=>{
    atualizarQR()
    atualizarStatus()
  },2000)
}

</script>

</body>
</html>
