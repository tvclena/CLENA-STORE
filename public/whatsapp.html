<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conectar WhatsApp</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  width:340px;
  text-align:center;
}

.qr img{
  width:220px;
  border-radius:12px;
  display:none;
}

.status{
  margin-top:15px;
  font-weight:bold;
}

.ok{ color:#22c55e }
.off{ color:#ef4444 }
</style>
</head>

<body>

<div class="card">

<h2>📲 Conectar WhatsApp</h2>

<div class="qr">
  <img id="qr">
</div>

<div id="status" class="status off">
🔄 Iniciando...
</div>

</div>

<script>

const BASE = "https://clena.com.br/whatsapp"
const loja_id = new URLSearchParams(location.search).get("l")

if(!loja_id){
  document.body.innerHTML = "<h2>❌ Loja não informada</h2>"
}

/* ================= SAFE FETCH ================= */

async function fetchJSON(url, options = {}) {
  try{
    const res = await fetch(url, options)

    if(!res.ok){
      console.warn("Erro:", url)
      return null
    }

    const text = await res.text()

    try{
      return JSON.parse(text)
    }catch{
      return null
    }

  }catch{
    return null
  }
}

/* ================= START ================= */

async function iniciar(){

  await fetchJSON(BASE + "/criar-sessao", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ loja_id })
  })

  monitorar()
}

/* ================= LOOP ================= */

function monitorar(){

  setInterval(async ()=>{

    // QR
    const qrData = await fetchJSON(BASE + "/qr/" + loja_id)

    const img = document.getElementById("qr")

    if(qrData && qrData.qr){
      img.src = qrData.qr
      img.style.display = "block"
    }

    // STATUS
    const statusData = await fetchJSON(BASE + "/status/" + loja_id)

    const el = document.getElementById("status")

    if(statusData && statusData.conectado){
      el.innerText = "🟢 Conectado!"
      el.className = "status ok"
      img.style.display = "none"
    }else{
      el.innerText = "📸 Escaneie o QR"
      el.className = "status off"
    }

  },2000)
}

iniciar()

</script>

</body>
</html>
