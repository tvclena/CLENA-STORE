<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-T97MS35TJ6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-T97MS35TJ6');
</script>
<title>Agenda • Agenda Fácil</title>

<meta name="viewport"
  content="width=device-width,
  initial-scale=1,
  maximum-scale=1,
  user-scalable=no,
  viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
:root{
  --primary:#ff6a00;
  --primary-700:#ea580c;
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --muted:#6b7280;
  --danger:#dc2626;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden}

/* ===== HEADER ===== */
.header{
  position:sticky; top:0; z-index:5;
  height:56px; background:#fff; border-bottom:1px solid var(--border);
  display:grid; grid-template-columns:40px 1fr auto 40px; align-items:center;
  padding:0 10px;
}
.header h1{font-size:14px;font-weight:800;text-align:center}
.header button{
  background:#fff7ed;border:none;border-radius:12px;padding:8px 10px;font-weight:800;cursor:pointer
}
#seletorColaborador{
  border:1px solid var(--border); border-radius:12px; padding:8px 10px; font-weight:700; font-size:12px;
}

/* ===== CALENDAR ===== */
.calendar{padding:12px; overflow-y:auto; height:calc(100vh - 56px)}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{
  background:#fff;border:1px solid var(--border);border-radius:14px;padding:6px 4px;
  min-height:120px; max-height:170px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  box-shadow:var(--shadow); transition:.15s ease; cursor:pointer; overflow:hidden;
}
.day:hover{transform:translateY(-1px); box-shadow:0 12px 28px rgba(0,0,0,.12)}
.day.inactive{opacity:.35}
.day strong{font-size:13px}

.day .content{
  width:100%;
  overflow-y:auto;
  padding:2px 4px 4px;
  scrollbar-width:none;
}
.day .content::-webkit-scrollbar{ width:0; height:0; }

.badge{font-size:10px;padding:2px 8px;border-radius:999px;margin-top:4px}
.badge.closed{background:#fee2e2;color:var(--danger)}
.badge.prev{background:#eef2ff;color:#3730a3}
.time{
  font-size:10px;background:#f9fafb;border-radius:8px;padding:3px 6px;
  margin-top:4px;width:100%;text-align:center;white-space:nowrap;
}

/* ===== MODAL ===== */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:1000}
.sheet{
  background:#fff;width:100%;height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;
  box-shadow:0 -10px 24px rgba(0,0,0,.2); animation:up .2s ease;
}
@keyframes up{from{transform:translateY(12px);opacity:.8}to{transform:none;opacity:1}}
.sheet-header{
  padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:900
}
.sheet-header .grab{width:36px;height:4px;background:#e5e7eb;border-radius:999px;margin:0 auto}
.sheet-body{flex:1;padding:14px;overflow-y:auto}
.sheet-body label{font-size:12px;display:block;margin-bottom:6px}
.horario{display:flex;gap:6px;margin-bottom:8px}
.horario input{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border)}
.horario button{background:#fee2e2;border:none;border-radius:12px;padding:0 12px}
.add-btn{width:100%;padding:12px;background:#fff7ed;border:none;border-radius:14px;margin-top:10px;font-weight:800}
.replica{margin-top:12px;font-size:12px}
.sheet-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px}
.sheet-footer button{flex:1;height:46px;border:none;border-radius:999px;font-weight:900}
.btn-save{background:linear-gradient(180deg,var(--primary),var(--primary-700));color:#fff}
.btn-close{background:#e5e7eb}

/* ===== INSIGHTS ===== */
.insights{
  margin-top:12px;
  background:#f8fafc;
  border:1px dashed var(--border);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}
.insights strong{font-size:12px}
#chartWrap{margin-top:8px}

/* ===== LOADING ===== */
#loading{
  position:fixed; inset:0; background:rgba(255,255,255,.6); backdrop-filter:blur(2px);
  display:none; align-items:center; justify-content:center; z-index:1100;
}
.spinner{width:42px;height:42px;border:4px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>
  <h1 id="monthLabel"></h1>
  <select id="seletorColaborador" style="display:none"></select>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div>
    <div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="days" id="days"></div>
</div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-header">
      <span id="modalDate"></span>
      <span class="grab"></span>
      <span onclick="fecharModal()">✕</span>
    </div>
    <div class="sheet-body">
      <label><input type="checkbox" id="fechado"> Dia fechado</label>

      <div class="insights">
        <div><strong>Ano passado (mesmo dia):</strong> <span id="prevCount">0</span> agendamentos</div>
        <div><strong>Horário de pico:</strong> <span id="prevPeak">—</span></div>
        <div id="chartWrap">
          <canvas id="peakChart" height="120"></canvas>
        </div>
      </div>

      <div id="horarios"></div>
      <button class="add-btn" onclick="addHorario()">+ Adicionar horário</button>
      <div class="replica">
        <label><input type="checkbox" id="replicaSemana"> Replicar para todas as <span id="replicaDia"></span></label>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-close" onclick="fecharModal()">Fechar</button>
      <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div></div>

<script>
/* === CONEXÃO SUPABASE === */
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let lojaId;
let colaboradorSelecionado = "LOJA";
let userId, agenda = {}, current = new Date(), selected = "", dirty = false;
let chart;

const loading = document.getElementById("loading");
const showLoading = (v)=> loading.style.display = v ? "flex" : "none";

/* === PLANO MASTER === */
async function verificarPlanoMaster(){
  const { data, error } = await sb.from("lojas").select("plano").eq("id", lojaId).single();
  if(error){ console.error(error); return false; }
  return data?.plano === "MASTER";
}

/* === INIT === */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) location.href = "login.html";
  lojaId = session.user.id;

  showLoading(true);
  const isMaster = await verificarPlanoMaster();

  if (isMaster) {
    document.getElementById("seletorColaborador").style.display = "block";
    await carregarColaboradores();
  } else {
    document.getElementById("seletorColaborador").style.display = "none";
    colaboradorSelecionado = "LOJA";
  }

  definirUserId();
  await carregar();
  showLoading(false);
})();

/* === COLABORADORES === */
async function carregarColaboradores(){
  const select = document.getElementById("seletorColaborador");
  select.innerHTML = `<option value="LOJA">Agenda da Loja</option>`;
  const { data } = await sb.from("colaboradores").select("id, nome").eq("loja_id", lojaId).eq("ativo", true).order("nome");
  (data||[]).forEach(c=>{
    const o=document.createElement("option"); o.value=c.id; o.textContent=c.nome; select.appendChild(o);
  });
  select.onchange=()=>{ colaboradorSelecionado=select.value; definirUserId(); carregar(); };
}

/* === USER ID === */
function definirUserId(){
  userId = (colaboradorSelecionado && colaboradorSelecionado!=="LOJA" && /^[0-9a-f-]{36}$/i.test(colaboradorSelecionado))
    ? colaboradorSelecionado : lojaId;
}

/* === MÊS === */
function changeMonth(v){ current.setMonth(current.getMonth()+v); carregar(); }

/* === CARREGAR AGENDA === */
async function carregar(){
  showLoading(true);
  const { data } = await sb.from("agenda_loja").select("data, fechado, horarios").eq("user_id", userId);
  agenda={};
  (data||[]).forEach(r=>{
    let h=[]; if(typeof r.horarios==="string"){try{h=JSON.parse(r.horarios)}catch{}} else if(Array.isArray(r.horarios)) h=r.horarios;
    agenda[r.data]={fechado:r.fechado,horarios:h};
  });
  render();
  showLoading(false);
}

/* === INSIGHTS ANO ANTERIOR === */
async function carregarInsightsAnoAnterior(iso){
  const prevIso = iso.replace(/^(\d{4})/, (m)=> String(Number(m)-1));
  const { data } = await sb.from("agendamentos").select("hora").eq("user_id", userId).eq("data", prevIso);

  const horas = {};
  (data||[]).forEach(a=>{
    const h = (a.hora||"").slice(0,2)+":00";
    horas[h] = (horas[h]||0) + 1;
  });

  const labels = Object.keys(horas).sort();
  const values = labels.map(l=>horas[l]);
  const total = values.reduce((s,v)=>s+v,0);

  document.getElementById("prevCount").innerText = total || 0;
  document.getElementById("prevPeak").innerText = labels.length ? labels[values.indexOf(Math.max(...values))] : "—";

  const ctx = document.getElementById("peakChart");
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type:"line",
    data:{ labels, datasets:[{ data:values, tension:.4, fill:true, borderWidth:2 }] },
    options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
  });

  return total;
}

/* === RENDER === */
function render(){
  days.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  monthLabel.innerText=current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const first=new Date(y,m,1).getDay(), total=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) days.innerHTML+=`<div class="day inactive"></div>`;

  for(let d=1;d<=total;d++){
    const key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const div=document.createElement("div"); div.className="day"; div.onclick=()=>open(key);
    const content=document.createElement("div"); content.className="content";
    div.innerHTML=`<strong>${d}</strong>`;

    if(agenda[key]){
      if(agenda[key].fechado) content.innerHTML+=`<div class="badge closed">Fechado</div>`;
      else agenda[key].horarios.forEach(h=> content.innerHTML+=`<div class="time">${h.inicio}-${h.fim}</div>`);
    }

    div.appendChild(content);
    days.appendChild(div);

    carregarInsightsAnoAnterior(key).then(totalPrev=>{
      if(totalPrev){
        const b = document.createElement("div");
        b.className = "badge prev";
        b.innerText = `Ano passado: ${totalPrev}`;
        content.prepend(b);
      }
    });
  }
}

/* === MODAL === */
function open(key){
  selected=key; dirty=false; modal.style.display="flex"; document.body.style.overflow="hidden";
  const date=dateFromISO(key);
  modalDate.innerText=date.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
  replicaDia.innerText=date.toLocaleDateString("pt-BR",{weekday:"long"});
  fechado.checked=agenda[key]?.fechado||false;
  horarios.innerHTML="";
  (agenda[key]?.horarios||[]).forEach(h=>addHorario(h.inicio,h.fim));
  carregarInsightsAnoAnterior(key);
}
function fecharModal(){
  if(dirty && confirm("Deseja salvar as alterações?")) salvar();
  else{ modal.style.display="none"; document.body.style.overflow="auto"; }
}

/* === HORÁRIOS === */
function addHorario(i="",f=""){
  dirty=true;
  const div=document.createElement("div"); div.className="horario";
  div.innerHTML=`<input type="time" value="${i}"><input type="time" value="${f}"><button onclick="this.parentElement.remove()">✕</button>`;
  horarios.appendChild(div);
}

/* === SALVAR === */
async function salvar(){
  const fechadoVal=fechado.checked, horariosVal=[];
  document.querySelectorAll(".horario").forEach(h=>{
    const i=h.children[0].value, f=h.children[1].value;
    if(i&&f) horariosVal.push({inicio:i,fim:f});
  });

  const base={fechado:fechadoVal,horarios:horariosVal}, updates=new Set([selected]);

  if(replicaSemana.checked){
    const b=dateFromISO(selected), wd=b.getDay(), y=b.getFullYear(), m=b.getMonth(), last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){
      const dt=new Date(y,m,d,12,0,0);
      if(dt.getDay()===wd) updates.add(`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
    }
  }

  showLoading(true);
  for(const d of updates){
    await sb.from("agenda_loja").upsert({user_id:userId,data:d,...base},{onConflict:"user_id,data"});
  }
  replicaSemana.checked=false; modal.style.display="none"; document.body.style.overflow="auto"; await carregar();
  showLoading(false);
}

/* === UTIL === */
function dateFromISO(iso){
  const [y,m,d]=iso.split("-").map(Number);
  return new Date(y,m-1,d,12,0,0);
}
</script>
</body>
</html>
