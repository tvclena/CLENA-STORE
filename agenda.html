<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-T97MS35TJ6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-T97MS35TJ6');
</script>
<title>Agenda • Agenda Fácil</title>

<meta name="viewport"
  content="width=device-width,
  initial-scale=1,
  maximum-scale=1,
  user-scalable=no,
  viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#ff6a00;
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#e5e7eb;
  --muted:#6b7280;
  --danger:#dc2626;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden}

/* ===== HEADER ===== */
.header{
  height:56px;background:#fff;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:40px 1fr auto 40px;align-items:center;
  padding:0 10px;
}
.header h1{text-align:center;font-weight:800;font-size:14px}
.header button{background:#fff7ed;border:none;border-radius:10px;padding:8px;font-weight:800}

/* ===== CALENDAR ===== */
.calendar{padding:12px;overflow-y:auto;height:calc(100vh - 56px)}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:var(--muted);margin-bottom:6px;text-align:center}

/* GRID RESPONSIVO (não estoura) */
.days{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
  gap:10px;
}

.day{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:8px;min-height:110px;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:var(--shadow);cursor:pointer;
}
.day.inactive{opacity:.35}
.day strong{font-size:14px;font-weight:800;margin-bottom:4px}

.badge.closed{
  background:#fee2e2;color:var(--danger);
  font-size:10px;padding:4px 10px;border-radius:999px;margin-bottom:6px
}

/* horários quebram linha e crescem em altura */
.time{
  font-size:10px;background:#f3f4f6;border-radius:8px;
  padding:4px 6px;margin-top:4px;width:100%;text-align:center;
  word-break:break-word;
}

/* ===== MODAL ===== */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:999}
.sheet{background:#fff;width:100%;height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column}
.sheet-header{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:900}
.sheet-body{flex:1;padding:14px;overflow-y:auto}
.horario{display:flex;gap:6px;margin-bottom:8px}
.horario input{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border)}
.horario button{background:#fee2e2;border:none;border-radius:10px;padding:0 10px}
.add-btn{width:100%;padding:12px;border:none;border-radius:12px;background:#fff7ed;font-weight:800;margin-top:10px}
.sheet-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px}
.sheet-footer button{flex:1;height:44px;border:none;border-radius:999px;font-weight:900}
.btn-save{background:var(--primary);color:#fff}
.btn-close{background:#e5e7eb}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>
  <h1 id="monthLabel"></h1>
  <select id="seletorColaborador" style="display:none;border:1px solid var(--border);border-radius:10px;padding:6px 10px"></select>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div>
    <div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="days" id="days"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="sheet">
    <div class="sheet-header">
      <span id="modalDate"></span>
      <span onclick="fecharModal()">✕</span>
    </div>
    <div class="sheet-body">
      <label><input type="checkbox" id="fechado"> Dia fechado</label>
      <div id="horarios"></div>
      <button class="add-btn" onclick="addHorario()">+ Adicionar horário</button>
      <div style="margin-top:10px;font-size:12px">
        <label><input type="checkbox" id="replicaSemana"> Replicar para todas as <span id="replicaDia"></span></label>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-close" onclick="fecharModal()">Fechar</button>
      <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let lojaId, colaboradorSelecionado = "LOJA";
let userId, agenda = {}, current = new Date(), selected = "", dirty = false;

async function verificarPlanoMaster(){
  const { data, error } = await sb.from("lojas").select("plano").eq("id", lojaId).single();
  if(error) return false;
  return data?.plano === "MASTER";
}

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session) location.href="login.html";
  lojaId = session.user.id;

  const isMaster = await verificarPlanoMaster();
  const seletor = document.getElementById("seletorColaborador");

  if(isMaster){
    seletor.style.display="block";
    await carregarColaboradores();
  } else {
    seletor.style.display="none";
    colaboradorSelecionado="LOJA";
  }

  if(
    isMaster &&
    window.parent &&
    window.parent.profissionalSelecionado &&
    window.parent.profissionalSelecionado!=="LOJA" &&
    /^[0-9a-f-]{36}$/i.test(window.parent.profissionalSelecionado)
  ){
    colaboradorSelecionado = window.parent.profissionalSelecionado;
    seletor.value = colaboradorSelecionado;
  }

  definirUserId();
  carregar();
})();

async function carregarColaboradores(){
  const { data } = await sb.from("colaboradores").select("id,nome").eq("loja_id",lojaId).eq("ativo",true).order("nome");
  const seletor = document.getElementById("seletorColaborador");
  seletor.innerHTML = `<option value="LOJA">Agenda da Loja</option>`;
  (data||[]).forEach(c=>{
    const o=document.createElement("option");
    o.value=c.id; o.textContent=c.nome;
    seletor.appendChild(o);
  });
  seletor.onchange=()=>{ colaboradorSelecionado=seletor.value; definirUserId(); carregar(); };
}

function definirUserId(){
  userId = (colaboradorSelecionado && colaboradorSelecionado!=="LOJA" && /^[0-9a-f-]{36}$/i.test(colaboradorSelecionado))
    ? colaboradorSelecionado : lojaId;
}

function changeMonth(v){ current.setMonth(current.getMonth()+v); carregar(); }

async function carregar(){
  const { data } = await sb.from("agenda_loja").select("data,fechado,horarios").eq("user_id",userId);
  agenda={};
  (data||[]).forEach(r=>{
    let h=[]; if(typeof r.horarios==="string"){try{h=JSON.parse(r.horarios)}catch{}}
    agenda[r.data]={fechado:r.fechado,horarios:h};
  });
  render();
}

function render(){
  days.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  monthLabel.innerText=current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const first=new Date(y,m,1).getDay(), total=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++) days.innerHTML+=`<div class="day inactive"></div>`;
  for(let d=1;d<=total;d++){
    const key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const div=document.createElement("div");
    div.className="day"; div.onclick=()=>open(key);
    div.innerHTML=`<strong>${d}</strong>`;
    if(agenda[key]){
      if(agenda[key].fechado) div.innerHTML+=`<div class="badge closed">Fechado</div>`;
      else agenda[key].horarios.forEach(h=> div.innerHTML+=`<div class="time">${h.inicio}-${h.fim}</div>`);
    }
    days.appendChild(div);
  }
}

function open(k){
  selected=k; modal.style.display="flex"; document.body.style.overflow="hidden";
  const d=new Date(k+"T12:00:00");
  modalDate.innerText=d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
  replicaDia.innerText=d.toLocaleDateString("pt-BR",{weekday:"long"});
  fechado.checked=agenda[k]?.fechado||false;
  horarios.innerHTML="";
  (agenda[k]?.horarios||[]).forEach(h=>addHorario(h.inicio,h.fim));
}
function fecharModal(){ modal.style.display="none"; document.body.style.overflow="auto"; }
function addHorario(i="",f=""){
  dirty=true;
  const d=document.createElement("div");
  d.className="horario";
  d.innerHTML=`<input type="time" value="${i}"><input type="time" value="${f}"><button onclick="this.parentElement.remove()">✕</button>`;
  horarios.appendChild(d);
}
async function salvar(){
  const fechadoVal=fechado.checked, horariosVal=[];
  document.querySelectorAll(".horario").forEach(h=>{
    const i=h.children[0].value, f=h.children[1].value;
    if(i&&f) horariosVal.push({inicio:i,fim:f});
  });
  const base={fechado:fechadoVal,horarios:horariosVal}, updates=new Set([selected]);

  if(replicaSemana.checked){
    const b=new Date(selected+"T12:00:00"),wd=b.getDay(),y=b.getFullYear(),m=b.getMonth(),last=new Date(y,m+1,0).getDate();
    for(let d=1;d<=last;d++){ const dt=new Date(y,m,d,12,0,0); if(dt.getDay()===wd) updates.add(`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`); }
  }

  for(const d of updates) await sb.from("agenda_loja").upsert({user_id:userId,data:d,...base},{onConflict:"user_id,data"});
  replicaSemana.checked=false; fecharModal(); carregar();
}
</script>

</body>
</html>
