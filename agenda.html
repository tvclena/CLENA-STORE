<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Agenda • Agenda Fácil</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
:root{
  --primary:#ff6a00; --primary-700:#ea580c;
  --bg:#f5f7fb; --card:#fff; --border:#e5e7eb;
  --muted:#6b7280; --danger:#dc2626;
  --shadow:0 10px 24px rgba(0,0,0,.08); --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden}

/* HEADER */
.header{position:sticky;top:0;z-index:5;height:56px;background:#fff;border-bottom:1px solid var(--border);
display:grid;grid-template-columns:40px 1fr 40px;align-items:center;padding:0 10px}
.header h1{text-align:center;font-weight:800}

/* CALENDAR */
.calendar{padding:12px;overflow-y:auto;height:calc(100vh - 56px);scrollbar-width:none}
.calendar::-webkit-scrollbar{width:0;height:0}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:#777;text-align:center;margin-bottom:8px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{background:#fff;border:1px solid var(--border);border-radius:14px;padding:6px 4px;
min-height:120px;max-height:170px;display:flex;flex-direction:column;align-items:center;
box-shadow:var(--shadow);cursor:pointer}
.day strong{font-size:13px}
.time{font-size:10px;background:#f9fafb;border-radius:8px;padding:3px 6px;margin-top:4px;width:100%;text-align:center}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:1000}
.sheet{background:#fff;width:100%;height:88vh;border-radius:18px 18px 0 0;
display:flex;flex-direction:column;box-shadow:0 -10px 24px rgba(0,0,0,.2)}
.sheet-header{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:800}
.sheet-body{flex:1;padding:14px;overflow-y:auto}
.sheet-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px}
.sheet-footer button{flex:1;height:46px;border:none;border-radius:999px;font-weight:800}
.btn-save{background:linear-gradient(180deg,var(--primary),var(--primary-700));color:#fff}
.btn-close{background:#e5e7eb}

/* INSIGHTS */
.insights{margin:10px 0;background:#f8fafc;border:1px dashed var(--border);border-radius:12px;padding:10px;font-size:12px}
#chartWrap{height:140px}

/* INPUTS */
.horario{display:flex;gap:6px;margin-bottom:8px}
.horario input{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border)}
.add-btn{width:100%;padding:12px;background:#fff7ed;border:none;border-radius:14px;margin-top:10px;font-weight:800}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>
  <h1 id="monthLabel"></h1>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div>
    <div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="days" id="days"></div>
</div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-header">
      <span id="modalDate"></span>
      <span onclick="fecharModal()">✕</span>
    </div>
    <div class="sheet-body">
      <div class="insights">
        <div><b>Ano passado:</b> <span id="prevCount">0</span> agendamentos</div>
        <div><b>Horário de pico:</b> <span id="prevPeak">—</span></div>
        <div id="chartWrap"><canvas id="peakChart"></canvas></div>
      </div>
    </div>

    <div class="sheet-footer">
      <button class="btn-close" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let userId, agenda={}, current=new Date(), selected="", chart=null;

(async ()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session) return location.href="login.html";
  userId=session.user.id;
  carregar();
})();

function changeMonth(v){ current.setMonth(current.getMonth()+v); carregar(); }

async function carregar(){
  const { data } = await sb.from("agenda_loja").select("*").eq("user_id", userId);
  agenda={};
  (data||[]).forEach(r=> agenda[r.data]={horarios:r.horarios||[]} );
  render();
}

function render(){
  days.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  monthLabel.innerText=current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const first=new Date(y,m,1).getDay(), total=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++) days.innerHTML+=`<div></div>`;
  for(let d=1;d<=total;d++){
    const key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const div=document.createElement("div");
    div.className="day";
    div.onclick=()=>open(key);
    div.innerHTML=`<strong>${d}</strong>`;
    days.appendChild(div);
  }
}

async function open(key){
  modal.style.display="flex";
  const d=new Date(key+"T12:00");
  modalDate.innerText=d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
  await carregarInsightsAnoAnterior(key);
}

function fecharModal(){ modal.style.display="none"; }

async function carregarInsightsAnoAnterior(iso){
  const [y,m,d]=iso.split("-");
  const prevIso = `${y-1}-${m}-${d}`;

  const { data } = await sb
    .from("agendamentos")
    .select("hora, data")
    .eq("user_id", userId)
    .gte("data", prevIso + " 00:00")
    .lte("data", prevIso + " 23:59");

  const map={};
  (data||[]).forEach(a=>{
    const h=(a.hora||"").slice(0,2)+":00";
    map[h]=(map[h]||0)+1;
  });

  const labels=Object.keys(map).sort();
  const values=labels.map(l=>map[l]);

  prevCount.innerText = values.reduce((s,v)=>s+v,0) || 0;
  prevPeak.innerText = labels.length ? labels[values.indexOf(Math.max(...values))] : "—";

  if(chart) chart.destroy();
  chart=new Chart(peakChart,{
    type:"line",
    data:{labels,datasets:[{data:values,tension:.4,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });
}
</script>

</body>
</html>
