<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda • Agenda Fácil</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
:root{
  --primary:#ff6a00; --primary-700:#ea580c;
  --bg:#f5f7fb; --card:#fff; --border:#e5e7eb;
  --muted:#6b7280; --danger:#dc2626;
  --shadow:0 10px 24px rgba(0,0,0,.08); --radius:16px;
}
*{box-sizing:border-box;font-family:Inter}
html,body{margin:0;width:100%;height:100%;background:var(--bg);overflow:hidden}

/* HEADER */
.header{
  position:sticky;top:0;z-index:10;height:56px;background:#fff;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:40px 1fr 40px;align-items:center;padding:0 10px
}
.header h1{font-size:14px;font-weight:800;text-align:center}
.header button{background:#fff7ed;border:none;border-radius:12px;padding:8px 10px;font-weight:900;cursor:pointer}

/* CALENDAR */
.calendar{padding:12px;height:calc(100vh - 56px);overflow:auto}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}

.day{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  padding:6px 4px;
  height:130px;                 /* ⬅️ MENOR */
  display:flex;
  flex-direction:column;
  align-items:stretch;
  box-shadow:var(--shadow);
  cursor:pointer;
  overflow:hidden;             /* card não estoura */
}

.day strong{
  font-size:12px;              /* ⬅️ menor */
  font-weight:900;
  text-align:center;
  margin-bottom:2px;
  flex-shrink:0;
}

.day .content{
  width:100%;
  flex:1;
  overflow-y:auto;             /* scroll só nos horários */
  padding:2px 2px 0;
}

.day .content::-webkit-scrollbar{
  width:4px;                   /* scrollbar fininha */
}
.day .content::-webkit-scrollbar-thumb{
  background:#e5e7eb;
  border-radius:999px;
}

/* Desktop / Tablet */
.time{
  font-size:10px;           /* bom para tela grande */
  font-weight:800;
  background:#f3f4f6;
  border-radius:8px;
  padding:4px 6px;
  margin-top:4px;
  width:100%;
  text-align:center;
  white-space:nowrap;
}
.badge.prev{font-size:10px;background:#eef2ff;color:#3730a3;padding:2px 8px;border-radius:999px;margin-top:4px}

/* MODAL */
#modal{
  position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:1000
}
.sheet{
  background:#fff;width:100%;height:88vh;border-radius:18px 18px 0 0;
  display:flex;flex-direction:column;box-shadow:0 -10px 24px rgba(0,0,0,.2)
}
.sheet-header{
  padding:14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;font-weight:900
}
.sheet-body{flex:1;padding:14px;overflow:auto;position:relative}
.sheet-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px}
.sheet-footer button{flex:1;height:46px;border:none;border-radius:999px;font-weight:900}
.btn-save{background:linear-gradient(180deg,var(--primary),var(--primary-700));color:#fff}
.btn-close{background:#e5e7eb}

/* OVERLAY ANO PASSADO */
#overlayPrev{
  position:absolute;inset:0;background:rgba(255,255,255,.85);
  backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:10
}
.spinner{width:42px;height:42px;border:4px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONFIG HORÁRIOS */
.horario{display:flex;gap:6px;margin-bottom:8px}
.horario input{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border)}
.horario button{background:#fee2e2;border:none;border-radius:12px;padding:0 12px}
.add-btn{width:100%;padding:12px;background:#fff7ed;border:none;border-radius:14px;margin:10px 0;font-weight:800}
.insights{
  margin-top:10px;
  background:#f8fafc;
  border:1px dashed var(--border);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

/* ==============================
   CONTAINER DO GRÁFICO (bonito + responsivo)
============================== */
.chart-wrap{
  position:relative;
  margin-top:10px;
  height:220px;               /* desktop */
  background:#ffffff;
  border-radius:12px;
  border:1px solid #eef2f7;
  padding:8px;
}

/* desktop: melhora o respiro do modal */
@media (min-width: 900px){
  .sheet{
    max-width: 920px;
    margin: 0 auto 24px auto;
  }
  .sheet-body{
    padding:18px 22px;
  }
}

/* celular: compacto */
@media (max-width: 420px){
  .day{ height:120px; }

  .time{ 
    font-size:7px; 
    padding:2px 4px; 
    margin-top:3px;
  }

  .time.fechado{
    font-size:7px;
  }

  .chart-wrap{
    height:140px;
  }
}

/* FECHADO (desktop / tablet) */
.time.fechado{
  font-size:10px;
  background:#fee2e2;
  color:#991b1b;
  font-weight:900;
  letter-spacing:.4px;
}


  @media (max-width: 420px){
  .day{ height:120px; }

  .time{ 
    font-size:7px; 
    padding:2px 4px; 
    margin-top:3px;
  }

  .time.fechado{
    font-size:7px;
  }
}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>
<button id="btnMulti" onclick="abrirMultiAgenda()" style="display:none" title="Disponível apenas no plano MASTER">
  Multi Agenda
</button>  <h1 id="monthLabel"></h1>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div>
    <div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="days" id="days"></div>
</div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-header">
      <span id="modalDate"></span>
      <span onclick="fecharModal()">✕</span>
    </div>

    <div class="sheet-body">
      <div id="overlayPrev">
        <div style="text-align:center">
          <div class="spinner"></div>
          <div style="margin-top:10px;font-weight:900">Buscando dados do ano anterior…</div>
        </div>
      </div>

      <label style="display:flex;gap:8px;align-items:center;font-weight:700">
        <input type="checkbox" id="fechado"> Dia fechado
      </label>

<div class="insights">
  <div>
    <strong>Ano passado (mesmo dia):</strong>
    <span id="prevCount">0</span> agendamentos
  </div>

  <div class="chart-wrap">
    <canvas id="peakChart"></canvas>
  </div>
</div>

      <div id="horarios"></div>
      <button class="add-btn" onclick="addHorario()">+ Adicionar horário</button>
    </div>

    <div class="sheet-footer">
      <button class="btn-close" onclick="fecharModal()">Fechar</button>
      <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let lojaId, agenda={}, current=new Date(), selected="", chart;
async function podeExibirMultiAgenda(){
  const { data, error } = await sb
    .from("usuarios")      // 👈 MUDE AQUI se sua tabela de usuários tiver outro nome
    .select("plano")
    .eq("id", lojaId)
    .single();

  if(error){
    console.error("Erro ao buscar plano:", error);
    return false;
  }

  return (data?.plano || "").toUpperCase() === "MASTER";
}

function abrirMultiAgenda(){
  alert("Aqui vai abrir a tela da Multi Agenda (te entrego já já pronta).");
}
  

(async ()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session) location.href="login.html";

  lojaId = session.user.id;

  const exibirMulti = await podeExibirMultiAgenda();
  const btn = document.getElementById("btnMulti");
  if(btn) btn.style.display = exibirMulti ? "inline-flex" : "none";

  carregar();
})();

function changeMonth(v){
  current.setMonth(current.getMonth()+v);
  carregar();
}

async function carregar(){
  const { data } = await sb.from("agenda_loja").select("data, fechado, horarios").eq("user_id", lojaId);
  agenda = {};
  (data||[]).forEach(r=>{
    let h=[];
    try{ h = typeof r.horarios==="string" ? JSON.parse(r.horarios) : (r.horarios||[]) }catch{}
    agenda[r.data] = { fechado: r.fechado, horarios: h };
  });
  render();
}

function render(){
  days.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  monthLabel.innerText = current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const first=new Date(y,m,1).getDay();
  const total=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) days.innerHTML+=`<div class="day"></div>`;

  for(let d=1; d<=total; d++){
    const key = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const div=document.createElement("div"); div.className="day";
    const content=document.createElement("div"); content.className="content";

    div.innerHTML=`<strong>${d}</strong>`;
if (agenda[key]?.fechado) {
  content.innerHTML = `<div class="time fechado">FECHADO</div>`;
} else {
  (agenda[key]?.horarios || []).forEach(h => {
    content.innerHTML += `<div class="time">${h.inicio} – ${h.fim}</div>`;
  });
}

    div.appendChild(content);
    div.onclick=()=>open(key);
    days.appendChild(div);
  }
}

async function open(iso){
  selected = iso;
  modal.style.display="flex";
  overlayPrev.style.display="flex";

  const d=new Date(iso+"T12:00");
  modalDate.innerText = d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});

  fechado.checked = agenda[iso]?.fechado || false;
  horarios.innerHTML="";
  (agenda[iso]?.horarios||[]).forEach(h=>addHorario(h.inicio,h.fim));

  const prevIso = iso.replace(/^(\d{4})/, y => +y - 1);

  const { data } = await sb
    .from("agendamentos")
    .select("hora_inicio,status")
    .eq("loja_id", lojaId)
    .eq("data", prevIso)
    .neq("status", "CANCELADO");

  const map={};
  (data||[]).forEach(a=>{
    const h=(a.hora_inicio||"").slice(0,2)+":00";
    map[h]=(map[h]||0)+1;
  });

  const labels=Object.keys(map).sort();
  const values=labels.map(l=>map[l]);
  prevCount.innerText = values.reduce((s,v)=>s+v,0);

  if(chart) chart.destroy();
chart = new Chart(peakChart, {
  type: "bar",
  data: {
    labels,
    datasets: [{
      label: "Agendamentos",
      data: values,
      borderRadius: 10,
      borderSkipped: false,
      backgroundColor: "rgba(255,106,0,.35)",
      hoverBackgroundColor: "rgba(255,106,0,.65)",
      maxBarThickness: 26
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: "#0f172a",
        titleColor: "#fff",
        bodyColor: "#e5e7eb",
        cornerRadius: 10,
        padding: 10
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: "#64748b", font: { weight: "700" } }
      },
      y: {
        beginAtZero: true,
        grid: { color: "#eef2f7" },
        ticks: { color: "#64748b", stepSize: 1 }
      }
    }
  }
});

  overlayPrev.style.display="none";
}

function addHorario(i="",f=""){
  const d=document.createElement("div");
  d.className="horario";
  d.innerHTML = `
<input type="time" value="${i}" oninput="validarLinha(this)">
<input type="time" value="${f}" oninput="validarLinha(this)">
    <button onclick="this.parentElement.remove()">✕</button>
  `;
  horarios.appendChild(d);
}

async function salvar(){
  try{
    let h = [];
    if (!fechado.checked) {
      document.querySelectorAll(".horario").forEach((x, idx)=>{
        const i = x.children[0].value;
        const f = x.children[1].value;

        if (!i || !f) return;

        // ❌ não permite início >= fim
        if (i >= f) {
          x.style.outline = "2px solid #dc2626";
          throw new Error(`Horário inválido no item ${idx+1}: início deve ser menor que o término.`);
        }

        h.push({ inicio:i, fim:f });
      });
    }

    // ✅ LOCAL EXATO: valida sobreposição (cole aqui)
    h.sort((a,b)=> a.inicio.localeCompare(b.inicio));
    for (let i = 1; i < h.length; i++) {
      if (h[i].inicio < h[i-1].fim) {
        throw new Error(
          `Horários sobrepostos: ${h[i-1].inicio}–${h[i-1].fim} conflita com ${h[i].inicio}–${h[i].fim}`
        );
      }
    }
    // ⬆️ FIM DO LOCAL EXATO

    await sb.from("agenda_loja").upsert(
      { user_id: lojaId, data: selected, fechado: fechado.checked, horarios: h },
      { onConflict: "user_id,data" }
    );

    modal.style.display="none";
    carregar();

  }catch(err){
    alert(err.message || "Existe horário inválido. Corrija antes de salvar.");
  }
}

function fecharModal(){
  modal.style.display="none";
}


function validarLinha(el){
  const row = el.parentElement;
  const i = row.children[0].value;
  const f = row.children[1].value;

  if (!i || !f) {
    row.style.outline = "";
    return;
  }

  if (i >= f) {
    row.style.outline = "2px solid #dc2626";
  } else {
    row.style.outline = "";
  }
}
</script>
</body>
</html>
