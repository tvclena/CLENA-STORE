<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda • Agenda Fácil</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#ff6a00;
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#e5e7eb;
  --muted:#6b7280;
  --danger:#dc2626;
  --shadow:0 6px 18px rgba(0,0,0,.08);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden}

/* HEADER */
.header{
  height:56px;background:#fff;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:40px 1fr auto 40px;align-items:center;
  padding:0 10px;
}
.header h1{text-align:center;font-weight:800;font-size:14px}
.header button{background:#fff7ed;border:none;border-radius:10px;padding:8px;font-weight:800}
#seletorColaborador{border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-weight:700}

/* CALENDAR AGENDA */
.calendar{
  height:calc(100vh - 56px);
  display:grid;
  grid-template-rows:auto 1fr;
}
.weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  background:#fff;
  border-bottom:1px solid var(--border);
  text-align:center;
  font-size:12px;
  font-weight:700;
}
.weekdays div{padding:8px 0}

.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:10px;
  overflow:hidden;
}

/* COLUNA DE CADA DIA */
.day{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  min-height:100%;
  overflow:hidden;
  cursor:pointer;
}
.day-header{
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  font-weight:800;
  text-align:center;
}
.day.inactive{opacity:.4}

/* CONTEÚDO DO DIA COM SCROLL */
.day-body{
  padding:6px;
  overflow-y:auto;
  flex:1;
}

.badge.closed{
  background:#fee2e2;
  color:var(--danger);
  font-size:11px;
  padding:4px 10px;
  border-radius:999px;
  display:inline-block;
  margin-bottom:6px;
}

.time{
  font-size:11px;
  background:#f3f4f6;
  border-radius:8px;
  padding:4px 6px;
  margin-bottom:4px;
  text-align:center;
}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:999}
.sheet{background:#fff;width:100%;height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column}
.sheet-header{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:900}
.sheet-body{flex:1;padding:14px;overflow-y:auto}
.horario{display:flex;gap:6px;margin-bottom:8px}
.horario input{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border)}
.horario button{background:#fee2e2;border:none;border-radius:10px;padding:0 10px}
.add-btn{width:100%;padding:12px;border:none;border-radius:12px;background:#fff7ed;font-weight:800;margin-top:10px}
.sheet-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px}
.sheet-footer button{flex:1;height:44px;border:none;border-radius:999px;font-weight:900}
.btn-save{background:var(--primary);color:#fff}
.btn-close{background:#e5e7eb}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>
  <h1 id="monthLabel"></h1>
  <select id="seletorColaborador" style="display:none"></select>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div>
    <div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="days" id="days"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="sheet">
    <div class="sheet-header">
      <span id="modalDate"></span>
      <span onclick="fecharModal()">✕</span>
    </div>
    <div class="sheet-body">
      <label><input type="checkbox" id="fechado"> Dia fechado</label>
      <div id="horarios"></div>
      <button class="add-btn" onclick="addHorario()">+ Adicionar horário</button>
      <div style="margin-top:10px;font-size:12px">
        <label><input type="checkbox" id="replicaSemana"> Replicar para todas as <span id="replicaDia"></span></label>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-close" onclick="fecharModal()">Fechar</button>
      <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient("https://egxjgmzukjyyxmkukwub.supabase.co","sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi");

let lojaId, colaboradorSelecionado="LOJA";
let userId, agenda={}, current=new Date(), selected="", dirty=false;

(async()=>{
  const { data:{session} } = await sb.auth.getSession();
  lojaId = session.user.id;
  definirUserId();
  carregar();
})();

function definirUserId(){ userId = lojaId; }
function changeMonth(v){ current.setMonth(current.getMonth()+v); carregar(); }

async function carregar(){
  const { data } = await sb.from("agenda_loja").select("data, fechado, horarios").eq("user_id", userId);
  agenda={};
  (data||[]).forEach(r=>{
    let h=[]; if(typeof r.horarios==="string"){try{h=JSON.parse(r.horarios)}catch{}}
    agenda[r.data]={fechado:r.fechado,horarios:h};
  });
  render();
}

function render(){
  days.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  monthLabel.innerText=current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const first=new Date(y,m,1).getDay(), total=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    const col=document.createElement("div");
    col.className="day inactive";
    col.innerHTML=`<div class="day-header"></div><div class="day-body"></div>`;
    days.appendChild(col);
  }

  for(let d=1;d<=total;d++){
    const key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const col=document.createElement("div");
    col.className="day";
    col.onclick=()=>open(key);
    col.innerHTML=`<div class="day-header">${d}</div><div class="day-body"></div>`;
    const body=col.querySelector(".day-body");

    if(agenda[key]){
      if(agenda[key].fechado){
        body.innerHTML+=`<div class="badge closed">Fechado</div>`;
      }else{
        agenda[key].horarios.forEach(h=>{
          body.innerHTML+=`<div class="time">${h.inicio} - ${h.fim}</div>`;
        });
      }
    }
    days.appendChild(col);
  }
}

function open(k){
  selected=k;
  modal.style.display="flex";
  const d=new Date(k+"T12:00:00");
  modalDate.innerText=d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
  replicaDia.innerText=d.toLocaleDateString("pt-BR",{weekday:"long"});
  fechado.checked=agenda[k]?.fechado||false;
  horarios.innerHTML="";
  (agenda[k]?.horarios||[]).forEach(h=>addHorario(h.inicio,h.fim));
}
function fecharModal(){ modal.style.display="none"; }
function addHorario(i="",f=""){
  const d=document.createElement("div");
  d.className="horario";
  d.innerHTML=`<input type="time" value="${i}"><input type="time" value="${f}"><button onclick="this.parentElement.remove()">✕</button>`;
  horarios.appendChild(d);
}
async function salvar(){ fecharModal(); }
</script>

</body>
</html>
