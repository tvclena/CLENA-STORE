<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda • Agenda Fácil</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
/* ===== SEU CSS 100% INTACTO ===== */
:root{
  --primary:#ff6a00; --primary-700:#ea580c;
  --bg:#f5f7fb; --card:#fff; --border:#e5e7eb;
  --muted:#6b7280; --danger:#dc2626;
  --shadow:0 10px 24px rgba(0,0,0,.08); --radius:16px;
}
*{box-sizing:border-box;font-family:Inter}
html,body{margin:0;width:100%;height:100%;background:var(--bg);overflow:hidden}
/* HEADER */
.header{
  position:sticky;top:0;z-index:10;height:56px;background:#fff;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:40px auto 1fr 40px;align-items:center;padding:0 10px;gap:8px
}
.header h1{font-size:14px;font-weight:800;text-align:center}
.header button{background:#fff7ed;border:none;border-radius:12px;padding:8px 10px;font-weight:900;cursor:pointer}
.calendar{padding:12px;height:calc(100vh - 56px);overflow:auto}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{background:#fff;border:1px solid var(--border);border-radius:16px;padding:6px 4px;height:130px;display:flex;flex-direction:column;box-shadow:var(--shadow);cursor:pointer;overflow:hidden}
.day strong{font-size:12px;font-weight:900;text-align:center;margin-bottom:2px}
.day .content{flex:1;overflow-y:auto;padding:2px}
.time{font-size:10px;font-weight:800;background:#f3f4f6;border-radius:8px;padding:4px 6px;margin-top:4px;text-align:center}
.time.fechado{background:#fee2e2;color:#991b1b}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:1000}
.sheet{background:#fff;width:100%;height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;box-shadow:0 -10px 24px rgba(0,0,0,.2)}
.sheet-header{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:900}
.sheet-body{flex:1;padding:14px;overflow:auto;position:relative}
.sheet-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px}
.sheet-footer button{flex:1;height:46px;border:none;border-radius:999px;font-weight:900}
.btn-save{background:linear-gradient(180deg,var(--primary),var(--primary-700));color:#fff}
.btn-close{background:#e5e7eb}
.spinner{width:42px;height:42px;border:4px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.horario{display:flex;gap:6px;margin-bottom:8px}
.horario input{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border)}
.add-btn{width:100%;padding:12px;background:#fff7ed;border:none;border-radius:14px;margin:10px 0;font-weight:800}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>

  <select id="seletorColab" onchange="trocarColaborador(this.value)" style="height:36px;border-radius:10px;border:1px solid #e5e7eb;padding:0 10px;font-weight:700;font-size:12px;max-width:180px">
    <option value="">Agenda da Loja</option>
  </select>

  <h1 id="monthLabel"></h1>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div>
    <div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="days" id="days"></div>
</div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-header">
      <span id="modalDate"></span>
      <span onclick="fecharModal()">✕</span>
    </div>
    <div class="sheet-body">
      <label style="display:flex;gap:8px;align-items:center;font-weight:700">
        <input type="checkbox" id="fechado"> Dia fechado
      </label>
      <div id="horarios"></div>
      <button class="add-btn" onclick="addHorario()">+ Adicionar horário</button>
    </div>
    <div class="sheet-footer">
      <button class="btn-close" onclick="fecharModal()">Fechar</button>
      <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let lojaId, agenda={}, current=new Date(), selected="";
let colaboradorSelecionado = null;

function trocarColaborador(id){
  colaboradorSelecionado = id || null;
  carregar();
}

(async ()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session) location.href="login.html";
  lojaId = session.user.id;
  await carregarColaboradores();
  carregar();
})();

function changeMonth(v){ current.setMonth(current.getMonth()+v); carregar(); }

async function carregar(){
  let q = sb.from("agenda_loja")
    .select("data, fechado, horarios")
    .eq("user_id", lojaId);

  if(colaboradorSelecionado){
    q = q.eq("colaborador_id", colaboradorSelecionado);
  } else {
    q = q.eq("colaborador_id", lojaId); // ✅ PADRÃO REAL
  }

  let { data } = await q;

  if(colaboradorSelecionado && (!data || data.length === 0)){
    const base = await sb.from("agenda_loja")
      .select("data, fechado, horarios")
      .eq("user_id", lojaId)
      .eq("colaborador_id", lojaId);
    data = base.data || [];
  }

  agenda = {};
  (data||[]).forEach(r=>{
    let h=[];
    try{ h = typeof r.horarios==="string" ? JSON.parse(r.horarios) : (r.horarios||[]) }catch{}
    agenda[r.data] = { fechado: r.fechado, horarios: h };
  });

  render();
}

async function carregarColaboradores(){
  const { data } = await sb
    .from("colaboradores")
    .select("id, nome")
    .eq("loja_id", lojaId)
    .eq("ativo", true)
    .order("nome");

  const sel = document.getElementById("seletorColab");
  sel.innerHTML = `<option value="">Agenda da Loja</option>` +
    (data||[]).map(c => `<option value="${c.id}">${c.nome}</option>`).join("");
}

function render(){
  days.innerHTML="";
  const y=current.getFullYear(), m=current.getMonth();
  monthLabel.innerText = current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const first=new Date(y,m,1).getDay();
  const total=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) days.innerHTML+=`<div class="day"></div>`;

  for(let d=1; d<=total; d++){
    const key = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const div=document.createElement("div"); div.className="day";
    const content=document.createElement("div"); content.className="content";
    div.innerHTML=`<strong>${d}</strong>`;
    if (agenda[key]?.fechado) {
      content.innerHTML = `<div class="time fechado">FECHADO</div>`;
    } else {
      (agenda[key]?.horarios || []).forEach(h => {
        content.innerHTML += `<div class="time">${h.inicio} – ${h.fim}</div>`;
      });
    }
    div.appendChild(content);
    div.onclick=()=>open(key);
    days.appendChild(div);
  }
}

function open(iso){
  selected = iso;
  modal.style.display="flex";
  const d=new Date(iso+"T12:00");
  modalDate.innerText = d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
  fechado.checked = agenda[iso]?.fechado || false;
  horarios.innerHTML="";
  (agenda[iso]?.horarios||[]).forEach(h=>addHorario(h.inicio,h.fim));
}

function addHorario(i="",f=""){
  const d=document.createElement("div");
  d.className="horario";
  d.innerHTML = `<input type="time" value="${i}"><input type="time" value="${f}"><button onclick="this.parentElement.remove()">✕</button>`;
  horarios.appendChild(d);
}

async function salvar(){
  let h = [];
  document.querySelectorAll(".horario").forEach(x=>{
    const i=x.children[0].value, f=x.children[1].value;
    if(i&&f) h.push({inicio:i,fim:f});
  });

  if(colaboradorSelecionado){
    await sb.from("agenda_loja").delete().eq("user_id",lojaId).eq("data",selected).eq("colaborador_id",colaboradorSelecionado);
    await sb.from("agenda_loja").insert({user_id:lojaId,colaborador_id:colaboradorSelecionado,data:selected,fechado:fechado.checked,horarios:h});
  } else {
    await sb.from("agenda_loja").delete().eq("user_id",lojaId).eq("data",selected).eq("colaborador_id",lojaId);
    await sb.from("agenda_loja").insert({user_id:lojaId,colaborador_id:lojaId,data:selected,fechado:fechado.checked,horarios:h});
  }

  modal.style.display="none";
  carregar();
}

function fecharModal(){ modal.style.display="none"; }
</script>

</body>
</html>
